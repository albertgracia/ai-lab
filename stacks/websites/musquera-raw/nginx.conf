server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $raw_backend http://musquera-server:3000;

    # Main website
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    # Admin panel - React app
    location /admin {
        alias /usr/share/nginx/html/admin-react/dist;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # API Backend Proxy
    # Use a trailing-slash prefix to ensure /api/* is always proxied.
    location ^~ /api/ {
        proxy_pass $raw_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api {
        proxy_pass $raw_backend/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

}
