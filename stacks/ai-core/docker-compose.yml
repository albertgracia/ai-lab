services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - /mnt/ai-models/ollama:/root/.ollama
    environment:
      - OLLAMA_METRICS=1
    ports:
      - "11434:11434"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - ollama
    volumes:
      - /opt/ai-lab/data/open-webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_BASE_URL=http://host.docker.internal:8083/v1
      - OPENAI_API_KEY=ailab
      - TZ=Europe/Madrid
    ports:
      - "3000:8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openwebui.rule=Host(`openwebui.local`)"
      - "traefik.http.routers.openwebui.entrypoints=web"
      - "traefik.http.services.openwebui.loadbalancer.server.port=8080"

networks:
  proxy:
    external: true
