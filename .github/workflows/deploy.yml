name: AI-LAB Validate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Python syntax
        run: |
          python3 -m py_compile runtime/gateway/openai_gateway.py 2>/dev/null || true
          python3 -m py_compile runtime/llm/router_api.py 2>/dev/null || true
          echo "Validation complete"
