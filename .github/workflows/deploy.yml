name: AI-LAB Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Python syntax
        run: |
          python3 -m py_compile runtime/gateway/openai_gateway.py || true
          python3 -m py_compile runtime/llm/router_api.py || true
      - name: Check systemd files
        run: |
          for f in .github/systemd/*.service; do
            [ -f "$f" ] && echo "Found: $f" || echo "No systemd files"
          done

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to AI-LAB
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: 192.168.1.30
          DEPLOY_USER: albert
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
          rsync -avz --exclude='.venv' --exclude='node_modules' --exclude='data' --exclude='backups' --exclude='snapshots' --exclude='.git' ./ $DEPLOY_USER@$DEPLOY_HOST:/opt/ai-lab/
          ssh $DEPLOY_USER@$DEPLOY_HOST "echo '19682507' | sudo -S systemctl restart ailab-gateway ailab-router ailab-live-state"
